<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vandal Lounge Bar | Powai Mumbai</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- [TEMP] PRELOADER REMOVED FOR DEPLOYMENT TROUBLESHOOTING -->

    <!-- Navigation -->
    <nav id="navbar">
        <div class="nav-container">
            <a href="#" class="logo-link"><img src="/media/logo.png" alt="Logo"></a>
            <div class="nav-toggle" id="nav-toggle"><span></span><span></span><span></span></div>
            <ul class="nav-menu">
                <li><a href="#about" class="nav-link">About</a></li>
                <li><a href="#experience" class="nav-link">Experience</a></li>
                <li><a href="#menu" class="nav-link">Menu</a></li>
                <li><a href="#contact" class="nav-link">Connect</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero -->
    <header id="hero" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; background: #050A1B;">
        <div class="hero-content">
            <h4 style="color: #D4AF37; letter-spacing: 5px; text-transform: uppercase;">Upscale & Avant-Garde</h4>
            <h1 style="font-family: 'Playfair Display', serif; font-size: clamp(3rem, 12vw, 8rem); margin: 20px 0;">VANDAL</h1>
            <p style="text-transform: uppercase; letter-spacing: 3px;">Lounge | Bar | Powai</p>
            <div style="margin-top: 40px;">
                <a href="#menu" style="background: #D4AF37; color: #050A1B; padding: 15px 30px; text-decoration: none; font-weight: 800;">View Menu</a>
            </div>
        </div>
    </header>

    <section id="about" style="padding: 100px 5%; display: grid; grid-template-columns: 1fr 1fr; gap: 50px; align-items: center;">
        <div>
            <img src="/media/gallery_interior.png" alt="Mural" style="width: 100%; border: 1px solid #D4AF37; padding: 10px;">
        </div>
        <div>
            <h2 style="font-family: 'Playfair Display', serif; font-size: 3rem; margin-bottom: 20px;">Art & Mixology</h2>
            <p>Vandal is an avant-garde destination where high-energy luxury meets artistic street soul.</p>
        </div>
    </section>

    <footer style="padding: 60px 0; background: #050A1B; border-top: 1px solid rgba(255,255,255,0.1); text-align: center;">
        <p>&copy; 2026 Vandal Lounge Bar.</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="module" src="./script.js"></script>
</body>
</html>
